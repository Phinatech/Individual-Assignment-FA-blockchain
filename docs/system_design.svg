<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 930" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,12 L12,6 z" fill="#334155"/>
    </marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,12 L12,6 z" fill="#dc2626"/>
    </marker>
    <linearGradient id="blockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="genGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <style>
      .title    { font-size: 26px; font-weight: 700; fill: #0f172a; }
      .sub      { font-size: 15px; fill: #475569; }
      .h        { font-size: 13px; font-weight: 700; fill: #0f172a; }
      .t        { font-size: 11px; fill: #1e293b; }
      .mono     { font-family: "Courier New", monospace; font-size: 10px; fill: #1e293b; }
      .label    { font-size: 12px; font-weight: 600; fill: #334155; }
      .panel    { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .block    { fill: url(#blockGrad); stroke: #1e40af; stroke-width: 2; rx: 6; }
      .gen      { fill: url(#genGrad);   stroke: #b45309; stroke-width: 2; rx: 6; }
      .chev     { stroke: #334155; stroke-width: 2; fill: none; }
      .danger   { stroke: #dc2626; stroke-width: 2; fill: none; stroke-dasharray: 6 4; }
      .pill     { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.2; rx: 12; }
    </style>
  </defs>

  <!-- Title -->
  <text x="600" y="38" class="title" text-anchor="middle">
    Blockchain Attendance Tracking System — System Design
  </text>
  <text x="600" y="62" class="sub" text-anchor="middle">
    SHA-256 hashing • ECDSA P-256 signing • Linked-list blockchain • File persistence
  </text>

  <!-- ====================== TOP : registry + auth flow ====================== -->
  <rect x="30"  y="90"  width="320" height="200" class="panel"/>
  <text x="190" y="115" class="h" text-anchor="middle">1. Student Registry</text>
  <text x="190" y="135" class="t" text-anchor="middle">Loaded once at startup from</text>
  <text x="190" y="152" class="mono" text-anchor="middle">students.txt</text>

  <rect x="55" y="170" width="270" height="100" fill="#ffffff" stroke="#94a3b8" rx="4"/>
  <text x="65" y="190" class="mono">ALU001,John Doe,BLK101</text>
  <text x="65" y="208" class="mono">ALU002,Jane Smith,BLK101</text>
  <text x="65" y="226" class="mono">ALU003,Amara Diallo,BLK101</text>
  <text x="65" y="250" class="t">→ parsed into Student[] in memory</text>
  <text x="65" y="266" class="t">→ used to validate every attendance attempt</text>

  <!-- crypto box -->
  <rect x="430" y="90" width="320" height="200" class="panel"/>
  <text x="590" y="115" class="h" text-anchor="middle">2. Cryptography (OpenSSL 3)</text>

  <rect x="450" y="135" width="280" height="55" fill="#ffffff" stroke="#94a3b8" rx="4"/>
  <text x="460" y="153" class="label">SHA-256</text>
  <text x="460" y="170" class="t">EVP_DigestInit_ex / Update / Final</text>
  <text x="460" y="184" class="t">→ 64-char hex digest per block</text>

  <rect x="450" y="200" width="280" height="80" fill="#ffffff" stroke="#94a3b8" rx="4"/>
  <text x="460" y="218" class="label">ECDSA P-256 (admin keypair)</text>
  <text x="460" y="234" class="mono">keys/admin_priv.pem   (chmod 600)</text>
  <text x="460" y="250" class="mono">keys/admin_pub.pem</text>
  <text x="460" y="270" class="t">Auto-generated on first run via EVP_EC_gen("P-256")</text>

  <!-- file persistence box -->
  <rect x="830" y="90" width="340" height="200" class="panel"/>
  <text x="1000" y="115" class="h" text-anchor="middle">3. File Persistence</text>

  <rect x="850" y="135" width="300" height="60" fill="#ffffff" stroke="#94a3b8" rx="4"/>
  <text x="860" y="153" class="label">attendance.dat (text, pipe-delimited)</text>
  <text x="860" y="171" class="mono">index|ts|id|name|course|status|</text>
  <text x="860" y="186" class="mono">prev_hash|sig_hex|hash</text>

  <rect x="850" y="205" width="300" height="75" fill="#ffffff" stroke="#94a3b8" rx="4"/>
  <text x="860" y="222" class="label">Behaviour</text>
  <text x="860" y="238" class="t">• Auto-save after every Mark-Attendance</text>
  <text x="860" y="254" class="t">• Re-loaded into the chain at startup</text>
  <text x="860" y="270" class="t">• Human-editable to demonstrate tampering</text>

  <!-- ====================== MIDDLE : Block struct ====================== -->
  <rect x="30" y="320" width="1140" height="210" class="panel"/>
  <text x="600" y="345" class="h" text-anchor="middle">4. Block Structure  (matches assignment specification)</text>

  <g transform="translate(60,360)">
    <rect width="1080" height="160" fill="#ffffff" stroke="#94a3b8" rx="4"/>
    <line x1="0" y1="22" x2="1080" y2="22" stroke="#cbd5e1"/>

    <text x="10" y="16" class="label">Field</text>
    <text x="220" y="16" class="label">Type</text>
    <text x="430" y="16" class="label">Description</text>

    <g transform="translate(10,40)">
      <text class="mono" y="0">index</text>          <text x="210" y="0" class="mono">int</text>                       <text x="420" y="0" class="t">Position in chain. 0 = Genesis.</text>
      <text class="mono" y="16">timestamp</text>      <text x="210" y="16" class="mono">time_t</text>                   <text x="420" y="16" class="t">Unix time of block creation.</text>
      <text class="mono" y="32">student_id</text>     <text x="210" y="32" class="mono">char[20]</text>                 <text x="420" y="32" class="t">Validated against the registry.</text>
      <text class="mono" y="48">full_name</text>      <text x="210" y="48" class="mono">char[50]</text>                 <text x="420" y="48" class="t">Copied from the registry.</text>
      <text class="mono" y="64">course_code</text>    <text x="210" y="64" class="mono">char[10]</text>                 <text x="420" y="64" class="t">Course identifier.</text>
      <text class="mono" y="80">status</text>         <text x="210" y="80" class="mono">char[10]</text>                 <text x="420" y="80" class="t">PRESENT, ABSENT, or LATE.</text>
      <text class="mono" y="96">previous_hash</text>  <text x="210" y="96" class="mono">char[65]</text>                <text x="420" y="96" class="t">SHA-256 of the previous block (64 zeros for Genesis).</text>
      <text class="mono" y="112">signature</text>     <text x="210" y="112" class="mono">unsigned char[72]</text>       <text x="420" y="112" class="t">ECDSA P-256 signature of the canonical block content.</text>
      <text class="mono" y="128">hash</text>          <text x="210" y="128" class="mono">char[65]</text>                <text x="420" y="128" class="t">SHA-256 of content || signature.</text>
    </g>
  </g>

  <!-- ====================== BOTTOM : Chain visualization ====================== -->
  <text x="30" y="560" class="h">5. Chain linkage</text>
  <text x="30" y="580" class="sub">Every block's <tspan class="mono">previous_hash</tspan> points back to the prior block; every block's <tspan class="mono">hash</tspan> covers its content + signature.</text>

  <!-- Genesis Block -->
  <g transform="translate(50,610)">
    <rect width="220" height="200" class="gen"/>
    <text x="110" y="22" class="h" text-anchor="middle">Block 0 — Genesis</text>
    <line x1="10" y1="32" x2="210" y2="32" stroke="#b45309" stroke-dasharray="3 3"/>
    <text x="10" y="50" class="mono">index       : 0</text>
    <text x="10" y="66" class="mono">timestamp   : 17786...</text>
    <text x="10" y="82" class="mono">student_id  : GENESIS</text>
    <text x="10" y="98" class="mono">course_code : N/A</text>
    <text x="10" y="114" class="mono">status      : GENESIS</text>
    <text x="10" y="130" class="mono">prev_hash   : 00000...</text>
    <text x="10" y="146" class="mono">             ...00000</text>
    <text x="10" y="162" class="mono">signature   : ECDSA</text>
    <text x="10" y="178" class="mono">hash        : e0e6946a...</text>
    <text x="10" y="194" class="mono">             a0e4814f3...</text>
  </g>

  <!-- Block 1 -->
  <g transform="translate(330,610)">
    <rect width="220" height="200" class="block"/>
    <text x="110" y="22" class="h" text-anchor="middle">Block 1</text>
    <line x1="10" y1="32" x2="210" y2="32" stroke="#1e40af" stroke-dasharray="3 3"/>
    <text x="10" y="50" class="mono">index       : 1</text>
    <text x="10" y="66" class="mono">timestamp   : 17786...</text>
    <text x="10" y="82" class="mono">student_id  : ALU001</text>
    <text x="10" y="98" class="mono">course_code : BLK101</text>
    <text x="10" y="114" class="mono">status      : PRESENT</text>
    <text x="10" y="130" class="mono">prev_hash   : e0e6946a...</text>
    <text x="10" y="146" class="mono">             a0e4814f3...</text>
    <text x="10" y="162" class="mono">signature   : ECDSA</text>
    <text x="10" y="178" class="mono">hash        : 7d66df67...</text>
    <text x="10" y="194" class="mono">             5e641f2e...</text>
  </g>

  <!-- Block 2 -->
  <g transform="translate(610,610)">
    <rect width="220" height="200" class="block"/>
    <text x="110" y="22" class="h" text-anchor="middle">Block 2</text>
    <line x1="10" y1="32" x2="210" y2="32" stroke="#1e40af" stroke-dasharray="3 3"/>
    <text x="10" y="50" class="mono">index       : 2</text>
    <text x="10" y="66" class="mono">timestamp   : 17786...</text>
    <text x="10" y="82" class="mono">student_id  : ALU002</text>
    <text x="10" y="98" class="mono">course_code : BLK101</text>
    <text x="10" y="114" class="mono">status      : LATE</text>
    <text x="10" y="130" class="mono">prev_hash   : 7d66df67...</text>
    <text x="10" y="146" class="mono">             5e641f2e...</text>
    <text x="10" y="162" class="mono">signature   : ECDSA</text>
    <text x="10" y="178" class="mono">hash        : 7eb3c463...</text>
    <text x="10" y="194" class="mono">             08a71cdd...</text>
  </g>

  <!-- Block N -->
  <g transform="translate(890,610)">
    <rect width="220" height="200" class="block"/>
    <text x="110" y="22" class="h" text-anchor="middle">Block N</text>
    <line x1="10" y1="32" x2="210" y2="32" stroke="#1e40af" stroke-dasharray="3 3"/>
    <text x="10" y="50" class="mono">index       : N</text>
    <text x="10" y="66" class="mono">timestamp   : ...</text>
    <text x="10" y="82" class="mono">student_id  : ALU...</text>
    <text x="10" y="98" class="mono">course_code : ...</text>
    <text x="10" y="114" class="mono">status      : ...</text>
    <text x="10" y="130" class="mono">prev_hash   : (block N-1)</text>
    <text x="10" y="146" class="mono">             hash...</text>
    <text x="10" y="162" class="mono">signature   : ECDSA</text>
    <text x="10" y="178" class="mono">hash        : ...</text>
  </g>

  <!-- chain arrows -->
  <path d="M270,710 L330,710" class="chev" marker-end="url(#arrow)"/>
  <path d="M550,710 L610,710" class="chev" marker-end="url(#arrow)"/>
  <path d="M830,710 L890,710" class="chev" marker-end="url(#arrow)"/>

  <!-- arrow labels -->
  <text x="300" y="702" class="label" text-anchor="middle">prev_hash</text>
  <text x="580" y="702" class="label" text-anchor="middle">prev_hash</text>
  <text x="860" y="702" class="label" text-anchor="middle">prev_hash</text>

  <!-- ====================== Right margin: legend ====================== -->
  <g transform="translate(30,830)">
    <rect width="1140" height="80" class="panel"/>
    <text x="20" y="22" class="h">6. Attendance flow (single block append)</text>
    <text x="20" y="44" class="t">
      <tspan class="label">①</tspan> User enters ID, status →
      <tspan class="label">②</tspan> registry_find() validates →
      <tspan class="label">③</tspan> Block populated with previous tail's hash →
      <tspan class="label">④</tspan> SHA-256 of canonical content →
      <tspan class="label">⑤</tspan> ECDSA signature with admin private key →
    </text>
    <text x="20" y="62" class="t">
      <tspan class="label">⑥</tspan> SHA-256 of (content || signature) becomes the block hash →
      <tspan class="label">⑦</tspan> Block appended to the in-memory linked list →
      <tspan class="label">⑧</tspan> Chain auto-saved to <tspan class="mono">attendance.dat</tspan>.
    </text>
  </g>
</svg>
